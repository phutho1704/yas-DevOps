name: storefront service ci

on:
  push:
    branches: [ "**" ]
    paths:
      - "storefront/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/storefront-ci.yaml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "storefront/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/storefront-ci.yaml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: storefront
      - run: npm run build
        working-directory: storefront
      - run: npm run lint
        working-directory: storefront
      - run: npx prettier --check .
        working-directory: storefront
      - name: SonarCloud Scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: storefront
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # ── CD: Build & Push image với tag = commit ID (mọi branch) ──
      - name: Set image tag
        id: tag
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image (tag = commit ID)
        uses: docker/build-push-action@v6
        with:
          context: ./storefront
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/yas-storefront:${{ steps.tag.outputs.TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/yas-storefront:${{ github.ref == 'refs/heads/main' && 'main' || github.head_ref }}
