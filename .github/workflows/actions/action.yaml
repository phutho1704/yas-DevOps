runs:
  using: "composite"
  steps:
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Install Node dependencies for dependency scanning
      shell: bash
      run: |
        set -e
        if [ -d storefront ] && [ -f storefront/package-lock.json ]; then
          npm ci --prefix storefront
        fi
        if [ -d backoffice ] && [ -f backoffice/package-lock.json ]; then
          npm ci --prefix backoffice
        fi
    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar